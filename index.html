<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイプリ衣装図鑑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>アイプリ衣装図鑑</h1>

<input type="text" id="searchInput" placeholder="コーデ名・パーツ検索">

<div class="filters">

  <h3>ブランド</h3>
  <label><input type="checkbox" data-key="brand" value="ラブリー">ラブリー</label>
  <label><input type="checkbox" data-key="brand" value="クール">クール</label>

  <h3>カラー</h3>
  <label><input type="checkbox" data-key="color" value="ピンク">ピンク</label>
  <label><input type="checkbox" data-key="color" value="ブルー">ブルー</label>

  <h3>弾</h3>
  <label><input type="checkbox" data-key="series" value="1弾">1弾</label>

  <h3>レアリティ</h3>
  <label><input type="checkbox" data-key="rarity" value="R">R</label>
  <label><input type="checkbox" data-key="rarity" value="SR">SR</label>

  <hr>
  <label>
    <input type="checkbox" id="groupToggle">
    色違いをまとめる
  </label>

</div>

<p id="count"></p>

<div id="cardContainer" class="card-grid"></div>

<script src="script.js"></script>
</body>
</html>
